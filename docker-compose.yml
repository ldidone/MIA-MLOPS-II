x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow.Dockerfile
  image: mia-mlops-ii/airflow:local
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    PYTHONPATH: /opt/airflow/project/src
    MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
    AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
    MODEL_NAME: ${MODEL_NAME}
    MODEL_ALIAS: ${MODEL_ALIAS}
    MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME}
    LOCAL_MODEL_PATH: /opt/airflow/project/models/model.pkl
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./src:/opt/airflow/project/src
    - ./conf:/opt/airflow/project/conf
    - ./scripts:/opt/airflow/project/scripts
    - ./data:/opt/airflow/project/data
    - ./models:/opt/airflow/project/models
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    mlflow:
      condition: service_started

services:
  postgres:
    image: postgres:15-alpine
    container_name: housing_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      # Host 5432 often collides with a local Postgres. Map to 5433 on the host;
      # services inside the compose network still reach it on 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: housing_minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    container_name: housing_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_DATA_BUCKET} &&
      mc mb --ignore-existing local/$${MINIO_MLFLOW_BUCKET} &&
      echo 'Buckets ready.';
      "
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: docker/mlflow.Dockerfile
    image: mia-mlops-ii/mlflow:local
    container_name: housing_mlflow
    restart: unless-stopped
    env_file: .env
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      MLFLOW_DEFAULT_ARTIFACT_ROOT: s3://${MINIO_MLFLOW_BUCKET}/
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      # Host port 5000 is often used by macOS AirPlay Receiver. The MLflow UI
      # is exposed on 5001 on the host; services inside the network still use 5000.
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: housing_airflow_init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --role Admin \
          --username "${AIRFLOW_ADMIN_USER}" \
          --password "${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Air \
          --lastname Flow \
          --email airflow@example.com || true

  airflow-webserver:
    <<: *airflow-common
    container_name: housing_airflow_webserver
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15

  airflow-scheduler:
    <<: *airflow-common
    container_name: housing_airflow_scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: mia-mlops-ii/api:local
    container_name: housing_api
    restart: unless-stopped
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      LOCAL_MODEL_PATH: /app/models/model.pkl
    depends_on:
      mlflow:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 15

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    image: mia-mlops-ii/streamlit:local
    container_name: housing_streamlit
    restart: unless-stopped
    env_file: .env
    environment:
      APP_MODE: api
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "8501:8501"

volumes:
  postgres_data:
  minio_data:
