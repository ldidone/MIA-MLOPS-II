# Central configuration for the training / serving pipeline.
#
# The project is a REGRESSION pipeline for scikit-learn's California Housing
# dataset. All column layouts are inferred at runtime so the pipeline stays
# dataset-agnostic; override the inference with explicit lists in `features`.

dataset:
  # Dataset is fetched directly from scikit-learn via
  # ``sklearn.datasets.fetch_california_housing`` — no external creds needed.
  source: sklearn_california_housing
  target_column: MedHouseVal
  # Columns to drop before training (identifiers / likely-leakage).
  drop_columns: []

features:
  # When any of the lists below is empty we auto-detect at runtime:
  #   numeric:      integer / float columns with > 2 unique values
  #   binary:       integer / boolean columns with values in {0, 1} or {True, False}
  #   categorical:  object / string / category columns
  # California Housing is all-numeric, so the default empty lists are correct.
  numeric: []
  categorical: []
  binary: []

split:
  test_size: 0.2
  val_size: 0.1
  random_state: 42

training:
  task: regression
  cv_folds: 5
  # Primary scoring used by cross-validation. Options we actually log as
  # metrics: r2, neg_mean_absolute_error, neg_root_mean_squared_error.
  scoring: r2
  models:
    linear_regression:
      estimator: linear_regression
      params: {}
    random_forest:
      estimator: random_forest
      params:
        n_estimators: 400
        max_depth: 18
        min_samples_leaf: 2
        n_jobs: -1
        random_state: 42
    xgboost:
      estimator: xgboost
      params:
        n_estimators: 500
        max_depth: 7
        learning_rate: 0.07
        subsample: 0.9
        colsample_bytree: 0.9
        objective: reg:squarederror
        eval_metric: rmse
        tree_method: hist
        random_state: 42

paths:
  raw_csv: data/raw/california_housing.csv
  processed_dir: data/processed
  local_model: models/model.pkl
  feature_metadata: models/feature_metadata.json
